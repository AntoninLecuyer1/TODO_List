<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./style.css">
    <title>My Website</title>
  </head>

  <body>
    <div id="burgerDiv">
      <button class="burger btn" aria-label="Menu">☰</button>

      <nav class="sidebar">
        <button class="close-btn btn" aria-label="Close">X</button>
        <ul>
          <li><a href="#">Accueil</a></li>
          <li><a href="#">Todos</a></li>
        </ul>
      </nav>
    </div>

    <main>
        <h1>Your TODO List</h1>
        <button class="btn" type="addProject"> Add project </button>
        <div class="container">
          <ul class="listTodo" id="listTodoHeader" >
            <li id="headerTitle" class="title" >Title</li>
            <li id="headerDescription" class="description">Description</li>
            <li id="headerDueDate" class="dueDate">Due Date</li>
            <li id="headerPriority" class="priority">Priority</li>
            <li id="headerStatus" class="status">Status</li>
          </ul>
          <button class="btn" type="submit">Add TODO</button>
        </div> 
    </main>

    <script type="module" src="todo.js"></script>
    <script type="module" src="project.js"></script>
    <script type="module" src="test.js"></script>
  </body>

</html>
